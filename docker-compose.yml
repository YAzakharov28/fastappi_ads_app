services:
  postgres:
    image: postgres:16-alpine
    container_name: fastapi_app_postgres
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB__PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fastapi_app_redis
    command: redis-server --requirepass ${REDIS__PASSWORD}
    ports:
      - "${REDIS__PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS__PASSWORD:-}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  migrations:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - app-network

  start_script:
    build: .
    env_file: .env
    depends_on:
      migrations:
        condition: service_completed_successfully
    command: python -m src.scripts
    networks:
      - app-network

  api:
    build: .
    container_name: fastapi_app
    env_file:
      - .env
    depends_on:
      start_script:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn src.main:app --host 0.0.0.0
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge